<!DOCTYPE html>
<html>
<head>
<title>Doma 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
  overflow-x:hidden;
}

/* Intro */
#intro {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:10;
}

button {
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:pink;
  font-weight:bold;
  margin:10px;
}

/* Images */
img {
  width:250px;
  border-radius:15px;
  margin:10px;
}

/* Gift box */
#gift {
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  color:black;
  padding:20px;
  border-radius:15px;
}

/* Hearts */
.heart {
  position:fixed;
  bottom:0;
  color:pink;
  animation:float 5s linear infinite;
}

@keyframes float {
  0% {transform:translateY(0);}
  100% {transform:translateY(-100vh);}
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <h1>💖 A Special Surprise 💖</h1>
  <button onclick="start()">Open</button>
</div>

<!-- MAIN -->
<h1>🎉 Happy Birthday Doma 🎂</h1>

<p id="msg"></p>

<!-- IMAGES -->
<img src="b51d1f6ff137826a0d6448a3.jpg">
<img src="bc98b42a954d905a16b8fc26.jpg">
<img src="f031e4e9e0bb5630c85b780.jpg">

<!-- MUSIC -->
<h2>🎵 Our Song</h2>
<button onclick="playMusic()">▶ Play Music</button>

<audio id="song">
  <source src="video_20260704_170652.mp3" type="audio/mpeg">
</audio>

<!-- GIFT -->
<br>
<button onclick="openGift()">🎁 Open Gift</button>

<div id="gift">
  <h2>💖 For You 💖</h2>
  <p>You are the most special person 💘</p>
  <button onclick="closeGift()">Close</button>
</div>

<script>

// START
function start(){
  document.getElementById("intro").style.display="none";
  typeText();
  hearts();
}

// TYPE TEXT
function typeText(){
  let text="Happy Birthday Doma 💖 You make my world beautiful ✨";
  let i=0;

  function typing(){
    if(i<text.length){
      document.getElementById("msg").innerHTML += text.charAt(i);
      i++;
      setTimeout(typing,50);
    }
  }
  typing();
}

// MUSIC
function playMusic(){
  document.getElementById("song").play();
}

// GIFT
function openGift(){
  document.getElementById("gift").style.display="block";
}
function closeGift(){
  document.getElementById("gift").style.display="none";
}

// HEARTS
function hearts(){
  setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💖";
    h.style.left=Math.random()*100+"%";
    h.style.fontSize=(Math.random()*20+10)+"px";
    document.body.appendChild(h);

    setTimeout(()=>{h.remove();},5000);
  },300);
}

</script>

</body>
</html>
