<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎂 Happy Birthday Doma</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff4b2b, #ff416c);
  color: white;
  text-align: center;
  overflow: hidden;
}

.container {
  margin-top: 40px;
}

h1 {
  font-size: 45px;
  text-shadow: 0 0 20px #fff;
}

button {
  padding: 10px 20px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  background: yellow;
  font-weight: bold;
  cursor: pointer;
}

#message {
  font-size: 24px;
  margin-top: 20px;
  min-height: 40px;
}

/* Slideshow */
.slideshow {
  width: 250px;
  height: 250px;
  margin: 20px auto;
  border-radius: 20px;
  overflow: hidden;
}

.slideshow img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Gift popup */
#giftBox {
  position: fixed;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: black;
  padding: 20px;
  border-radius: 20px;
  display: none;
}

/* Fireworks */
canvas {
  position: fixed;
  top: 0;
  left: 0;
}
</style>
</head>

<body>

<div class="container">
  <h1>🎉 Happy Birthday Doma 🎂</h1>

  <button onclick="start()">Start Surprise</button>
  <button onclick="music()">🎵 Music</button>

  <div id="message"></div>

  <div class="slideshow">
    <img id="slide" src="photo1.jpg">
  </div>

  <button onclick="showGift()">🎁 Open Gift</button>
</div>

<div id="giftBox">
  <h2>🎁 Surprise!</h2>
  <p>Doma, you mean a lot 💖 Never stop smiling 😊</p>
  <button onclick="closeGift()">Close</button>
</div>

<audio id="song" src="https://www.bensound.com/bensound-music/bensound-sunny.mp3"></audio>

<canvas id="fireworks"></canvas>

<script>
// 🎵 Music
function music() {
  document.getElementById("song").play();
}

// 💌 Typewriter
function typeText(text) {
  let i = 0;
  function typing() {
    if (i < text.length) {
      document.getElementById("message").innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, 50);
    }
  }
  document.getElementById("message").innerHTML = "";
  typing();
}

// 🚀 Start
function start() {
  typeText("🎉 Happy Birthday Doma! 🎂💖 You are truly special, may your day be filled with happiness, love, and surprises! ✨🎁");
  startFireworks();
}

// 🎁 Gift
function showGift() {
  document.getElementById("giftBox").style.display = "block";
}
function closeGift() {
  document.getElementById("giftBox").style.display = "none";
}

// 📸 Slideshow (PUT YOUR REAL PHOTOS HERE)
let images = [
  "photo1.jpg",
  "photo2.jpg",
  "photo3.jpg"
];

let index = 0;
setInterval(() => {
  index = (index + 1) % images.length;
  document.getElementById("slide").src = images[index];
}, 2000);

// 🎇 Fireworks
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function startFireworks() {
  for (let i = 0; i < 120; i++) {
    particles.push({
      x: canvas.width / 2,
      y: canvas.height / 2,
      dx: (Math.random() - 0.5) * 6,
      dy: (Math.random() - 0.5) * 6,
      size: Math.random() * 3
    });
  }
}

function animate() {
  ctx.fillStyle = "rgba(0,0,0,0.2)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    ctx.fillStyle = "white";
    ctx.fillRect(p.x, p.y, p.size, p.size);
    p.x += p.dx;
    p.y += p.dy;
  });

  requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
